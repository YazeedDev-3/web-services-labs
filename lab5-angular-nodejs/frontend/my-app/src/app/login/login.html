<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h4>Book Manager</h4>
      <p class="text-muted">Sign in to your account</p>
    </div>
    <form>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" [(ngModel)]="name" name="name" placeholder="Enter your username">
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" [(ngModel)]="pass" name="pass" placeholder="Enter your password">
      </div>
      <div class="error-msg">{{ message }}</div>
      <button (click)="loginclick()" class="btn btn-primary w-100 login-btn">Sign In</button>
    </form>
  </div>
</div>
